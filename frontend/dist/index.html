    <script>
      // Apply theme + title before React renders (prevents flash)
      (function() {
        try {
          const cached = localStorage.getItem('admin_panel_ui_settings_v1');
          if (cached) {
            const parsed = JSON.parse(cached);
            if (parsed && typeof parsed.browserTitle === 'string') {
              document.title = parsed.browserTitle;
            }
          }
        } catch (e) {}
        try {
          const lkTitle = localStorage.getItem('lk_brand_title');
          if (lkTitle) document.title = lkTitle;
        } catch (e) {}
        try {
          const accent = localStorage.getItem('panel_accent_color');
          if (accent) document.documentElement.setAttribute('data-accent', accent);
        } catch (e) {}
        try {
          const theme = localStorage.getItem('theme');
          if (theme === 'light') {
            document.documentElement.classList.remove('dark');
            document.body.classList.remove('dark');
          } else {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
