<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#b91c1c"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- base -->
  <rect x="10" y="10" width="108" height="108" rx="28" fill="url(#bg)" filter="url(#soft)"/>
  <rect x="14" y="14" width="100" height="100" rx="24" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>

  <!-- bold W (reads well at 16px) -->
  <path d="M28 34 L42 96 L64 56 L86 96 L100 34"
        fill="none"
        stroke="rgba(0,0,0,0.22)"
        stroke-width="20"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  <path d="M28 34 L42 96 L64 56 L86 96 L100 34"
        fill="none"
        stroke="#ffffff"
        stroke-width="16"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>

