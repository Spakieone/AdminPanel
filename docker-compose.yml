services:
  adminpanel:
    build: .
    image: adminpanel:local
    container_name: adminpanel
    restart: unless-stopped
    env_file: .env
    environment:
      - ADMINPANEL_DATA_DIR=/data
      - HOST_PROJECT_DIR=${HOST_PROJECT_DIR:-/root/adminpanel}
      # - ADMINPANEL_ROOT_MODE=lk
      - ADMINPANEL_LK_HOSTS=lkk.nonotouch.com
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - .:/host-project:ro
      - /root/bot/modules/api/version.json:/root/bot/modules/api/version.json:ro
    ports:
      - "127.0.0.1:8888:8888"
    extra_hosts:
      - "host.docker.internal:host-gateway"
